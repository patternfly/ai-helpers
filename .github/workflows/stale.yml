name: Close stale issues and PRs
on:
  schedule:
    - cron: '0 12 * * *'
jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 30
          days-before-close: 7
          exempt-issue-labels: pinned
          exempt-pr-labels: pinned
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >-
            This issue has been automatically marked as stale after 30 days
            of inactivity. It will be closed in 7 days if there's no further
            activity. Feel free to comment or reopen if this is still relevant.
          stale-pr-message: >-
            This PR has been automatically marked as stale after 30 days
            of inactivity. It will be closed in 7 days if there's no further
            activity. Feel free to reopen or push new commits if you'd like
            to continue working on it.
