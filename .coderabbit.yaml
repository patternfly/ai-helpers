language: "en-US"
tone_instructions: >
  Prioritize bugs, logic errors, and security issues. Post only critical issues
  as actionable comments. All other findings — style, best practices, minor
  improvements — must be nitpick comments.

reviews:
  request_changes_workflow: true
  profile: "assertive"
  high_level_summary: true
  poem: false
  sequence_diagrams: false
  auto_review:
    enabled: true
    base_branches: ["main"]
    path_filters:
      - "!docs/**"
      - "!**/README.md"
  path_instructions:
    - path: "plugins/**/SKILL.md"
      instructions: >
        Review against CONTRIBUTING-SKILLS.md and the skill-creator plugin at
        anthropics/claude-plugins-official. Check: frontmatter has name and
        description, description includes trigger contexts, content describes
        outcomes not implementation, skill is tool-agnostic (must work in both
        Claude Code and Cursor — no tool-specific references). Security: flag
        hardcoded secrets or tokens, instructions that tell the AI to disable
        permissions, skip verification, send data to external services without
        user confirmation, access secrets/credentials, or access files outside
        the target project directory without explicit justification. Do not
        flag pf- prefix naming or markdown formatting.
    - path: "plugins/**/agents/*.md"
      instructions: >
        Review against CONTRIBUTING-SKILLS.md. Agents provide domain knowledge
        the AI follows across all interactions in the plugin's area — they are
        not tasks that produce results (those are skills). Must be tool-agnostic.
    - path: "**/.claude-plugin/**"
      instructions: >
        Manifests must be identical in .claude-plugin/ and .cursor-plugin/.
        If this file changed, verify the corresponding file in the other
        directory has the exact same content. Flag any differences.
    - path: "**/.cursor-plugin/**"
      instructions: >
        Manifests must be identical in .claude-plugin/ and .cursor-plugin/.
        If this file changed, verify the corresponding file in the other
        directory has the exact same content. Flag any differences.
    - path: "plugins/**/*.{js,sh,py,ts}"
      instructions: >
        Review for bugs, logic errors, security issues, and broken behavior.
        These run as part of AI skills — check for runtime errors, missing
        error handling at system boundaries, and incorrect data transformations.
        Security checklist: flag hardcoded secrets or tokens, curl piped to
        shell (curl | bash), use of --no-verify or --force flags, unquoted
        variables in shell commands, eval or exec on user input, access to
        files or resources outside the target project without explicit
        justification, and any network requests to URLs not provided by the
        user. Do not flag style or formatting.
    - path: "scripts/**"
      instructions: >
        Repo-level automation scripts. Review for bugs, correctness, and
        broken behavior. These generate docs and maintain repo consistency.
    - path: "CONTRIBUTING*.md"
      instructions: >
        These are the source-of-truth guidelines that CodeRabbit and human
        reviewers use to evaluate all contributions. Changes here affect every
        future review. Verify accuracy, check for contradictions, and ensure
        the plugin taxonomy table stays consistent with the actual plugins/
        directory structure.

knowledge_base:
  web_search:
    enabled: true
  learnings:
    scope: "auto"
  code_guidelines:
    enabled: true
    filePatterns:
      - "CONTRIBUTING.md"
      - "CONTRIBUTING-SKILLS.md"
  linked_repositories:
    - repository: "anthropics/claude-plugins-official"
      instructions: >
        Contains Anthropic's official skill-creator plugin with authoritative
        guidance on skill structure, frontmatter descriptions, writing patterns,
        and evaluation. Reference plugins/skill-creator/ when reviewing skill
        quality in PRs.
