language: "en-US"
tone_instructions: >
  Review against CONTRIBUTING.md and CONTRIBUTING-SKILLS.md. Reference Anthropic's skill-creator plugin for skill quality. State guidelines used. Skip general code quality.

reviews:
  profile: "chill"
  high_level_summary: true
  auto_review:
    enabled: true
    base_branches: ["main"]

knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - "CONTRIBUTING.md"
      - "CONTRIBUTING-SKILLS.md"
  linked_repositories:
    - repository: "anthropics/claude-plugins-official"
      instructions: >
        Contains Anthropic's official skill-creator plugin with authoritative
        guidance on skill structure, frontmatter descriptions, writing patterns,
        and evaluation. Reference plugins/skill-creator/ when reviewing skill
        quality in PRs.
